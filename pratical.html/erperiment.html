<!DOCTYPE html>
<html>
<head>
    <title>Reverse Number</title>
</head>

<body style="font-family:Arial; background-color:#cfdbe7; text-align:center; margin-top:100px;">

<div style="width:300px; margin:auto; padding:20px; border:3px solid #0debfb; border-radius:10px; background:white;">

 <h2 style="color:rgb(223, 12, 82);">Reverse Number</h2>

 <input type="number" id="num" placeholder="Enter Number"
        style="padding:8px; width:80%; border:1px solid gray; border-radius:5px;">

  <br><br>

    <button onclick="reverseNum()"
        style="padding:8px 20px; background:blue; color:white; border-radius:5px; cursor:pointer;">
            Reverse
        </button>

   <h3 id="result" style="color:rgb(148, 221, 21);"></h3>

    </div>

    <script>
        function reverseNum() {
            let n = document.getElementById("num").value;
            let rev = n.split("").reverse().join("");
            document.getElementById("result").innerHTML = "Reverse: " + rev;
        }
    </script>

</body>
</html>
